<!DOCTYPE html>
<html>
<head>
  <title>AI Chat</title>
</head>
<body style="font-family: Arial; max-width:600px; margin:50px auto;">

  <h2>AI Chat</h2>

  <div id="chat" style="border:1px solid #ccc; height:400px; overflow-y:auto; padding:10px;"></div>

  <div style="margin-top:10px;">
    <input id="input" style="width:80%; padding:10px;" placeholder="Type a message..." />
    <button onclick="sendMessage()">Send</button>
  </div>

  <script>
    let messages = [];

    function addMessage(role, text) {
      const chat = document.getElementById("chat");

      const div = document.createElement("div");
      div.style.textAlign = role === "user" ? "right" : "left";
      div.style.margin = "10px 0";

      const span = document.createElement("span");
      span.style.padding = "8px 12px";
      span.style.borderRadius = "10px";
      span.style.background = role === "user" ? "#007bff" : "#eee";
      span.style.color = role === "user" ? "#fff" : "#000";

      span.innerText = text;
      div.appendChild(span);
      chat.appendChild(div);

      chat.scrollTop = chat.scrollHeight;
    }

    async function sendMessage() {
      const input = document.getElementById("input");
      const text = input.value;

      if (!text) return;

      addMessage("user", text);
      messages.push({ role: "user", content: text });

      input.value = "";

      addMessage("assistant", "Typing...");

      try {
        const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "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"
          },
          body: JSON.stringify({
            model: "openai/gpt-3.5-turbo",
            messages
          })
        });

        const data = await res.json();
        const reply = data?.choices?.[0]?.message?.content || "Error";

        messages.push({ role: "assistant", content: reply });

        // remove "Typing..."
        const chat = document.getElementById("chat");
        chat.lastChild.remove();

        addMessage("assistant", reply);

      } catch (err) {
        console.error(err);
      }
    }

    document.getElementById("input").addEventListener("keydown", function(e) {
      if (e.key === "Enter") sendMessage();
    });
  </script>

</body>
</html>
