<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chat</title>

<style>
body{
font-family:system-ui,-apple-system,Segoe UI,Roboto;
margin:0;
background:#0b0f1a;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

header{
display:flex;
align-items:center;
padding:16px;
border-bottom:1px solid #1f2937;
}

.logo{
width:40px;
height:40px;
background:#ff8a3d;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

.title{
margin-left:12px;
font-size:18px;
font-weight:600;
}

.status{
margin-left:8px;
width:8px;
height:8px;
background:#22c55e;
border-radius:50%;
}

#chat{
flex:1;
overflow:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:16px;
}

.message{
max-width:75%;
padding:12px 16px;
border-radius:16px;
line-height:1.5;
}

.user{
align-self:flex-end;
background:#1e293b;
}

.bot{
align-self:flex-start;
background:#111827;
border:1px solid #1f2937;
}

.loading{
opacity:.6;
font-style:italic;
}

footer{
display:flex;
padding:12px;
border-top:1px solid #1f2937;
}

input{
flex:1;
background:#111827;
border:1px solid #374151;
color:white;
padding:12px;
border-radius:10px;
outline:none;
}

button{
margin-left:10px;
background:#ff8a3d;
border:none;
padding:12px 16px;
border-radius:10px;
color:white;
cursor:pointer;
font-weight:600;
}
</style>
</head>

<body>

<header>
<div class="logo">✦</div>
<div class="title">AI Chat</div>
<div class="status"></div>
</header>

<div id="chat"></div>

<footer>
<input id="input" placeholder="Ask something..." />
<button onclick="send()">Send</button>
</footer>

<script>

const chat=document.getElementById("chat")
const input=document.getElementById("input")

function addMessage(role,text){

const div=document.createElement("div")
div.className="message "+(role==="user"?"user":"bot")

div.innerHTML=text
chat.appendChild(div)

chat.scrollTop=chat.scrollHeight

return div
}

async function send(){

const message=input.value.trim()
if(!message) return

addMessage("user",message)
input.value=""

const loading=addMessage("assistant","AI is thinking...")
loading.classList.add("loading")

try{

const res=await fetch("/api/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
messages:[{role:"user",content:message}]
})
})

const data=await res.json()

console.log("API RESPONSE:",data)

if(!data.text){

loading.innerHTML=data.error || "AI service unavailable."
loading.classList.remove("loading")
return

}

let text=data.text || "No response"
text=text.replace(/\n/g,"<br>")

loading.innerHTML=text
loading.classList.remove("loading")

}catch(err){

console.error(err)

loading.innerHTML="Connection error. Please try again."
loading.classList.remove("loading")

}

}

input.addEventListener("keydown",e=>{
if(e.key==="Enter") send()
})

</script>

</body>
</html>
