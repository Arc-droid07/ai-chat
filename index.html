<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d0d14">
<title>Aki AI</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<style>
  :root {
    --bg: #0d0d14;
    --surface: #13131d;
    --surface2: #1a1a27;
    --surface3: #222233;
    --border: rgba(255,255,255,0.06);
    --border2: rgba(255,255,255,0.1);
    --accent: #e8956d;
    --accent2: #d4784e;
    --accent-glow: rgba(232,149,109,0.12);
    --text: #ede9e3;
    --text2: #9e9a94;
    --text3: #5a5752;
    --sidebar-w: 260px;
    --safe-b: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); overflow: hidden; font-family: 'DM Sans', sans-serif; }

  #layout { display: flex; height: 100dvh; }

  #sidebar {
    width: var(--sidebar-w);
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    flex-shrink: 0;
    transform: translateX(-100%);
    position: fixed; top: 0; left: 0; bottom: 0;
    z-index: 50; transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
  }
  #sidebar.open { transform: translateX(0); }

  .sidebar-header {
    padding: 18px 16px 12px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .sidebar-title { font-family: 'DM Serif Display', serif; font-size: 17px; color: var(--text); }

  .new-chat-btn {
    display: flex; align-items: center; gap: 8px;
    margin: 12px; padding: 10px 14px;
    background: var(--accent); border: none; border-radius: 12px;
    color: white; font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.15s;
  }
  .new-chat-btn:active { background: var(--accent2); transform: scale(0.97); }

  #chat-list { flex: 1; overflow-y: auto; padding: 8px; }
  #chat-list::-webkit-scrollbar { width: 2px; }
  #chat-list::-webkit-scrollbar-thumb { background: var(--surface3); }

  .chat-item {
    padding: 10px 12px; border-radius: 10px;
    cursor: pointer; transition: all 0.15s;
    font-size: 13px; color: var(--text2);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
  }
  .chat-item:hover, .chat-item.active { background: var(--surface2); color: var(--text); }
  .chat-item.active { border-left: 2px solid var(--accent); padding-left: 10px; }
  .chat-item-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .delete-btn {
    width: 20px; height: 20px; border-radius: 5px;
    border: none; background: transparent; color: var(--text3);
    cursor: pointer; font-size: 13px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.15s;
  }
  .chat-item:hover .delete-btn { opacity: 1; }
  .delete-btn:hover { color: #e07070; background: rgba(220,80,80,0.1); }

  .no-chats { padding: 20px; text-align: center; font-size: 13px; color: var(--text3); line-height: 1.6; }

  #overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    z-index: 40; display: none; backdrop-filter: blur(2px);
  }
  #overlay.show { display: block; }

  #main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

  #header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 13px 16px;
    background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0;
  }

  .hlogo {
    width: 32px; height: 32px;
    background: linear-gradient(145deg, #e8956d, #c4623a);
    border-radius: 10px; display: flex; align-items: center;
    justify-content: center; font-size: 16px;
    box-shadow: 0 2px 12px rgba(232,149,109,0.3);
  }

  .hleft { display: flex; align-items: center; gap: 10px; }
  .htitle { font-family: 'DM Serif Display', serif; font-size: 17px; }
  .hsubtitle { font-size: 11px; color: var(--text3); margin-top: 1px; }

  .hbtn {
    width: 36px; height: 36px; border-radius: 10px;
    border: 1px solid var(--border2); background: var(--surface2);
    color: var(--text2); display: flex; align-items: center;
    justify-content: center; cursor: pointer; font-size: 16px; transition: all 0.15s;
  }
  .hbtn:active { transform: scale(0.92); background: var(--surface3); }
  .hright { display: flex; gap: 7px; }

  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #5cb87a; box-shadow: 0 0 6px rgba(92,184,122,0.5);
    animation: blink 2.5s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .status-dot.thinking { background: var(--accent); box-shadow: 0 0 6px rgba(232,149,109,0.5); }

  #chat {
    flex: 1; overflow-y: auto; padding: 20px 14px;
    display: flex; flex-direction: column; gap: 16px;
    -webkit-overflow-scrolling: touch;
  }
  #chat::-webkit-scrollbar { width: 2px; }
  #chat::-webkit-scrollbar-thumb { background: var(--surface3); }

  #welcome {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100%; text-align: center; padding: 40px 20px; gap: 16px;
  }
  .wlogo {
    width: 68px; height: 68px;
    background: linear-gradient(145deg, #e8956d, #c4623a);
    border-radius: 20px; display: flex; align-items: center;
    justify-content: center; font-size: 34px;
    box-shadow: 0 8px 30px rgba(232,149,109,0.3);
    animation: float 4s ease-in-out infinite;
  }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
  .wtitle { font-family: 'DM Serif Display', serif; font-size: 26px; letter-spacing: -0.02em; }
  .wtitle em { font-style: italic; color: var(--accent); }
  .wsub { font-size: 14px; color: var(--text2); max-width: 260px; line-height: 1.6; font-weight: 300; }
  .wchips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 4px; }
  .chip {
    padding: 9px 15px; background: var(--surface2);
    border: 1px solid var(--border2); border-radius: 100px;
    font-size: 13px; color: var(--text2); cursor: pointer; transition: all 0.15s;
  }
  .chip:active { background: var(--surface3); transform: scale(0.95); }

  .msg { display: flex; gap: 10px; animation: msgIn 0.25s ease-out; }
  .msg.user { flex-direction: row-reverse; }
  @keyframes msgIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

  .av {
    width: 30px; height: 30px; border-radius: 9px;
    flex-shrink: 0; display: flex; align-items: center;
    justify-content: center; margin-top: 2px; font-size: 13px;
  }
  .av.ai { background: linear-gradient(145deg, #e8956d, #c4623a); box-shadow: 0 2px 8px rgba(232,149,109,0.3); }
  .av.you { background: var(--surface3); border: 1px solid var(--border2); font-weight: 700; font-size: 11px; color: var(--text2); }

  .bubble {
    max-width: calc(100% - 48px); padding: 11px 14px;
    border-radius: 16px; font-size: 15px; line-height: 1.65;
  }
  .msg.ai .bubble {
    background: #14141f; border: 1px solid var(--border);
    border-bottom-left-radius: 5px;
    font-family: 'DM Serif Display', serif;
  }
  .msg.user .bubble {
    background: #172030; border: 1px solid rgba(90,150,220,0.15);
    border-bottom-right-radius: 5px;
  }

  /* Code highlighting */
  .bubble pre { margin: 8px 0; border-radius: 10px; overflow: hidden; }
  .bubble pre code { font-size: 13px; font-family: monospace; border-radius: 10px; }
  .bubble code:not(pre code) { background: rgba(255,255,255,0.07); padding: 2px 6px; border-radius: 4px; font-size: 13px; font-family: monospace; }

  .bubble strong { color: var(--accent); font-weight: 500; }
  .bubble p { margin-bottom: 8px; }
  .bubble p:last-child { margin-bottom: 0; }
  .bubble ul, .bubble ol { padding-left: 18px; margin: 6px 0; }
  .bubble li { margin-bottom: 4px; }

  /* Generated image */
  .gen-img { max-width: 100%; border-radius: 12px; margin-top: 8px; border: 1px solid var(--border2); }

  .model-tag { font-size: 10px; color: var(--text3); margin-top: 4px; margin-left: 40px; }

  .thinking-wrap { display: flex; gap: 10px; }
  .thinking { display: flex; gap: 5px; padding: 13px 15px; background: #14141f; border: 1px solid var(--border); border-radius: 16px; border-bottom-left-radius: 5px; align-items: center; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); opacity: 0.5; animation: bounce 1.3s infinite ease-in-out; }
  .dot:nth-child(2){animation-delay:0.16s} .dot:nth-child(3){animation-delay:0.32s}
  @keyframes bounce { 0%,80%,100%{transform:translateY(0);opacity:0.3} 40%{transform:translateY(-7px);opacity:1} }

  #input-area {
    padding: 10px 12px; padding-bottom: calc(10px + var(--safe-b));
    background: var(--surface); border-top: 1px solid var(--border); flex-shrink: 0;
  }
  .input-row {
    display: flex; align-items: flex-end; gap: 8px;
    background: var(--surface2); border: 1px solid var(--border2);
    border-radius: 16px; padding: 8px 8px 8px 14px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .input-row:focus-within { border-color: rgba(232,149,109,0.4); box-shadow: 0 0 0 3px var(--accent-glow); }
  #inp {
    flex: 1; background: none; border: none; outline: none;
    color: var(--text); font-family: 'DM Sans', sans-serif;
    font-size: 15px; line-height: 1.5; resize: none;
    max-height: 130px; min-height: 24px; padding: 0;
  }
  #inp::placeholder { color: var(--text3); }

  .input-btn {
    width: 36px; height: 36px; border-radius: 10px;
    border: none; color: white; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.15s; font-size: 17px;
  }
  #voicebtn { background: var(--surface3); color: var(--text2); font-size: 18px; }
  #voicebtn.listening { background: #e07070; color: white; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
  #sendbtn { background: var(--accent); }
  #sendbtn:active { transform: scale(0.88); background: var(--accent2); }
  #sendbtn:disabled { background: var(--surface3); color: var(--text3); cursor: default; transform: none; }

  #toast {
    position: fixed; bottom: 80px; left: 50%;
    transform: translateX(-50%) translateY(16px);
    background: var(--surface3); border: 1px solid var(--border2);
    color: var(--text); padding: 9px 18px; border-radius: 100px;
    font-size: 13px; opacity: 0; transition: all 0.22s;
    pointer-events: none; white-space: nowrap; z-index: 999;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div id="overlay" onclick="closeSidebar()"></div>

<div id="layout">
  <div id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">Chats</div>
      <div class="hbtn" onclick="closeSidebar()">✕</div>
    </div>
    <button class="new-chat-btn" onclick="newChat()">✦ New Chat</button>
    <div id="chat-list"></div>
  </div>

  <div id="main">
    <div id="header">
      <div class="hleft">
        <div class="hbtn" onclick="openSidebar()">☰</div>
        <div class="hlogo">✦</div>
        <div>
          <div class="htitle">Aki</div>
          <div class="hsubtitle" id="subtitle">Ready</div>
        </div>
        <div class="status-dot" id="statusdot"></div>
      </div>
      <div class="hright">
        <div class="hbtn" onclick="newChat()" title="New chat">✎</div>
      </div>
    </div>

    <div id="chat"></div>

    <div id="input-area">
      <div class="input-row">
        <textarea id="inp" placeholder="Ask Aki anything…" rows="1"
          onkeydown="onKey(event)" oninput="resize(this)"></textarea>
        <button class="input-btn" id="voicebtn" onclick="toggleVoice()" title="Voice input">🎤</button>
        <button class="input-btn" id="sendbtn" onclick="send()">↑</button>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
let chats = {};
let currentChatId = null;
let busy = false;
let recognition = null;
let listening = false;

const API_URL = '/api/chat';
const IMG_TRIGGERS = /generate|create|draw|make|show me|image of|picture of|paint|illustrate/i;

function init() {
  loadFromStorage();
  if (Object.keys(chats).length === 0) newChat(false);
  else {
    const lastId = localStorage.getItem('current_chat');
    loadChat(lastId && chats[lastId] ? lastId : Object.keys(chats)[0]);
  }
  renderChatList();
  setupVoice();
}

function saveToStorage() {
  localStorage.setItem('ai_chats', JSON.stringify(chats));
  localStorage.setItem('current_chat', currentChatId);
}

function loadFromStorage() {
  try {
    const saved = localStorage.getItem('ai_chats');
    if (saved) chats = JSON.parse(saved);
  } catch(e) { chats = {}; }
}

function openSidebar() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('overlay').classList.add('show');
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

function newChat(save = true) {
  const id = 'chat_' + Date.now();
  chats[id] = { title: 'New Chat', messages: [] };
  currentChatId = id;
  if (save) saveToStorage();
  renderChatList();
  renderMessages();
  closeSidebar();
  document.getElementById('inp').focus();
}

function loadChat(id) {
  if (!chats[id]) return;
  currentChatId = id;
  saveToStorage();
  renderChatList();
  renderMessages();
  closeSidebar();
}

function deleteChat(id, e) {
  e.stopPropagation();
  delete chats[id];
  if (currentChatId === id) {
    const remaining = Object.keys(chats);
    if (remaining.length > 0) loadChat(remaining[0]);
    else newChat(false);
  }
  saveToStorage();
  renderChatList();
}

function renderChatList() {
  const list = document.getElementById('chat-list');
  const ids = Object.keys(chats).reverse();
  if (ids.length === 0) {
    list.innerHTML = '<div class="no-chats">No chats yet.<br>Start a new conversation!</div>';
    return;
  }
  list.innerHTML = ids.map(id => `
    <div class="chat-item ${id === currentChatId ? 'active' : ''}" onclick="loadChat('${id}')">
      <span class="chat-item-text">💬 ${chats[id].title}</span>
      <button class="delete-btn" onclick="deleteChat('${id}', event)">✕</button>
    </div>
  `).join('');
}

function renderMessages() {
  const chat = document.getElementById('chat');
  const messages = chats[currentChatId]?.messages || [];
  if (messages.length === 0) {
    chat.innerHTML = `
      <div id="welcome">
        <div class="wlogo">✦</div>
        <div class="wtitle">Hey, I'm <em>Aki</em></div>
        <div class="wsub">Your smart AI assistant. Ask me anything — I'll find it.</div>
        <div class="wchips">
          <div class="chip" onclick="q('What happened in India today?')">Today's news</div>
          <div class="chip" onclick="q('Generate an image of a futuristic city')">Generate image</div>
          <div class="chip" onclick="q('Current dollar to rupee rate')">$ to ₹ rate</div>
          <div class="chip" onclick="q('Write a Python hello world')">Write code</div>
          <div class="chip" onclick="q('Who created you?')">Who made you?</div>
        </div>
      </div>`;
    return;
  }
  chat.innerHTML = '';
  messages.forEach(m => addBubble(m.role, m.content, m.model, m.image, false));
  scrollDown();
}

function q(text) {
  document.getElementById('inp').value = text;
  send();
}

function onKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
}

function resize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 130) + 'px';
}

async function send() {
  if (busy) return;
  const inp = document.getElementById('inp');
  const text = inp.value.trim();
  if (!text) return;

  const w = document.getElementById('welcome');
  if (w) w.remove();

  inp.value = ''; inp.style.height = 'auto';

  chats[currentChatId].messages.push({ role: 'user', content: text });

  if (chats[currentChatId].messages.length === 1) {
    chats[currentChatId].title = text.substring(0, 35) + (text.length > 35 ? '…' : '');
    renderChatList();
  }

  addBubble('user', text, null, null, true);
  scrollDown();

  busy = true;
  document.getElementById('sendbtn').disabled = true;
  setStatus('thinking');
  const thinkEl = addThinking();

  // Check if image generation requested
  if (IMG_TRIGGERS.test(text)) {
    try {
      const imgUrl = await generateImage(text);
      thinkEl.remove();
      const aiMsg = { role: 'assistant', content: 'Here you go! 🎨', image: imgUrl };
      chats[currentChatId].messages.push(aiMsg);
      saveToStorage();
      addBubble('ai', aiMsg.content, null, imgUrl, true);
      setStatus('ready');
    } catch(e) {
      // fallback to normal chat if image fails
      await normalChat(text, thinkEl);
    }
  } else {
    await normalChat(text, thinkEl);
  }

  busy = false;
  document.getElementById('sendbtn').disabled = false;
  scrollDown();
}

async function normalChat(text, thinkEl) {
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: chats[currentChatId].messages })
    });
    const data = await res.json();
    thinkEl.remove();
    if (!res.ok) throw new Error(data.error || 'Error');
    chats[currentChatId].messages.push({ role: 'assistant', content: data.text });
    saveToStorage();
    addBubble('ai', data.text, null, null, true);
    setStatus('ready');
  } catch(err) {
    thinkEl.remove();
    addBubble('ai', `**Oops.** ${err.message || 'Connection error. Try again.'}`, null, null, true);
    setStatus('ready');
    chats[currentChatId].messages.pop();
  }
}

async function generateImage(prompt) {
  // Using Pollinations.ai — completely free, no API key needed
  const clean = prompt.replace(/generate|create|draw|make|show me|image of|picture of|paint|illustrate/gi, '').trim();
  const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(clean)}?width=512&height=512&nologo=true&seed=${Date.now()}`;
  // Preload to verify
  await new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = resolve;
    img.onerror = reject;
    img.src = url;
  });
  return url;
}

function setStatus(s) {
  document.getElementById('statusdot').className = 'status-dot' + (s === 'thinking' ? ' thinking' : '');
  document.getElementById('subtitle').textContent = s === 'thinking' ? 'Thinking…' : 'Ready';
}

function addBubble(role, content, model, image, animate) {
  const chat = document.getElementById('chat');
  const wrap = document.createElement('div');

  const div = document.createElement('div');
  div.className = `msg ${role}`;
  if (!animate) div.style.animation = 'none';

  const av = document.createElement('div');
  av.className = `av ${role}`;
  av.textContent = role === 'user' ? 'You' : '✦';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = md(content);

  // Add generated image if present
  if (image) {
    const img = document.createElement('img');
    img.src = image;
    img.className = 'gen-img';
    img.alt = 'Generated image';
    bubble.appendChild(img);
  }

  div.appendChild(av);
  div.appendChild(bubble);
  wrap.appendChild(div);

  if (model && role === 'ai') {
    const tag = document.createElement('div');
    tag.className = 'model-tag';
    tag.textContent = '↳ ' + model;
    wrap.appendChild(tag);
  }

  chat.appendChild(wrap);

  // Apply syntax highlighting
  wrap.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));
}

function addThinking() {
  const chat = document.getElementById('chat');
  const wrap = document.createElement('div');
  wrap.className = 'thinking-wrap';
  wrap.innerHTML = `<div class="av ai">✦</div><div class="thinking"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  chat.appendChild(wrap);
  scrollDown();
  return wrap;
}

function md(text) {
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
      const l = lang || 'plaintext';
      return `<pre><code class="language-${l}">${code.trim()}</code></pre>`;
    })
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
    .replace(/\*([^*\n]+)\*/g,'<em>$1</em>')
    .replace(/^#{1,3} (.+)$/gm,'<strong>$1</strong>')
    .split(/\n\n+/)
    .map(p=>{
      p=p.trim(); if(!p) return '';
      if(p.startsWith('<pre>')) return p;
      const lines=p.split('\n');
      if(lines.every(l=>/^[\-\*\d]/.test(l.trim())))
        return '<ul>'+lines.map(l=>`<li>${l.replace(/^[\-\*]\s*/,'').replace(/^\d+\.\s*/,'')}</li>`).join('')+'</ul>';
      return `<p>${p.replace(/\n/g,'<br>')}</p>`;
    }).join('');
}

function scrollDown() {
  const chat = document.getElementById('chat');
  setTimeout(() => chat.scrollTo({ top: chat.scrollHeight, behavior: 'smooth' }), 40);
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

// ── VOICE INPUT ──
function setupVoice() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    document.getElementById('voicebtn').style.display = 'none';
    return;
  }
  recognition = new SpeechRecognition();
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.lang = 'en-IN';

  recognition.onresult = (e) => {
    const transcript = e.results[0][0].transcript;
    document.getElementById('inp').value = transcript;
    resize(document.getElementById('inp'));
    stopListening();
    send();
  };

  recognition.onerror = () => stopListening();
  recognition.onend = () => stopListening();
}

function toggleVoice() {
  if (listening) { stopListening(); return; }
  if (!recognition) { toast('Voice not supported on this browser'); return; }
  listening = true;
  document.getElementById('voicebtn').classList.add('listening');
  document.getElementById('voicebtn').textContent = '🔴';
  setStatus('listening');
  recognition.start();
}

function stopListening() {
  listening = false;
  document.getElementById('voicebtn').classList.remove('listening');
  document.getElementById('voicebtn').textContent = '🎤';
  setStatus('ready');
  try { recognition.stop(); } catch(e) {}
}

if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', () => {
    document.getElementById('main').style.height = window.visualViewport.height + 'px';
  });
}

init();
</script>
</body>
</html>
