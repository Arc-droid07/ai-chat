<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aki AI</title>

<style>

body{
font-family:system-ui;
margin:0;
background:#0b0f1a;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

header{
display:flex;
align-items:center;
padding:16px;
border-bottom:1px solid #1f2937;
}

.logo{
width:40px;
height:40px;
background:#ff8a3d;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

.title{
margin-left:12px;
font-size:18px;
font-weight:600;
}

.status{
margin-left:8px;
width:8px;
height:8px;
background:#22c55e;
border-radius:50%;
}

#chat{
flex:1;
overflow:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:16px;
}

.message{
max-width:75%;
padding:12px 16px;
border-radius:16px;
line-height:1.5;
}

.user{
align-self:flex-end;
background:#1e293b;
}

.bot{
align-self:flex-start;
background:#111827;
border:1px solid #1f2937;
}

footer{
display:flex;
padding:12px;
border-top:1px solid #1f2937;
}

input{
flex:1;
background:#111827;
border:1px solid #374151;
color:white;
padding:12px;
border-radius:10px;
outline:none;
}

button{
margin-left:10px;
background:#ff8a3d;
border:none;
padding:12px 16px;
border-radius:10px;
color:white;
cursor:pointer;
font-weight:600;
}

img{
max-width:100%;
border-radius:12px;
margin-top:10px;
}

</style>
</head>

<body>

<header>
<div class="logo">A</div>
<div class="title">Aki AI</div>
<div class="status"></div>
</header>

<div id="chat"></div>

<footer>
<input id="input" placeholder="Ask something..." />
<button onclick="send()">Send</button>
</footer>

<script>

const chat = document.getElementById("chat")
const input = document.getElementById("input")

function addMessage(role,text,image=null){

const div = document.createElement("div")
div.className="message "+(role==="user"?"user":"bot")

const textNode=document.createElement("div")
textNode.innerText=text
div.appendChild(textNode)

if(image){

const img=document.createElement("img")
img.src=image
div.appendChild(img)

}

chat.appendChild(div)
chat.scrollTop=chat.scrollHeight

return div

}

async function send(){

const message=input.value.trim()
if(!message) return

addMessage("user",message)
input.value=""

const loading=addMessage("assistant","Aki is thinking...")

try{

const res=await fetch("/api/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
messages:[
{role:"user",content:message}
]
})
})

const data=await res.json()

loading.innerHTML=""

if(data.text){

const textDiv=document.createElement("div")
textDiv.innerText=data.text
loading.appendChild(textDiv)

}

if(data.image){

const img=document.createElement("img")
img.src=data.image
loading.appendChild(img)

}

}catch(err){

loading.innerText="Connection error."

}

}

input.addEventListener("keydown",e=>{
if(e.key==="Enter") send()
})

</script>

</body>
</html>
